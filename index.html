<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Sync - Stage & Command</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --primary: #6366f1; --accent: #fbbf24; --bg: #000; --panel: rgba(20, 22, 28, 0.98); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }

        /* PLAYER STAGE */
        #playerStage { position: absolute; inset: 0; display: none; background: #000; overflow: hidden; z-index: 1; }
        #vContainer { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; transition: transform 0.2s ease-out; }
        video { width: 100%; height: 100%; object-fit: contain; }

        /* REMOTE CONTROL */
        #remoteStage { position: absolute; inset: 0; display: none; flex-direction: column; background: #0a0c10; padding: 15px; box-sizing: border-box; z-index: 10; }
        .panel { background: var(--panel); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 12px; margin-bottom: 10px; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        
        button { 
            padding: 14px 2px; border-radius: 10px; border: 1px solid #222; 
            background: #16181d; color: #fff; font-size: 10px; font-weight: 800; cursor: pointer;
        }
        button:active { background: var(--primary); transform: scale(0.95); }
        
        input[type="text"] { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #222; background: #000; color: #fff; box-sizing: border-box; margin-bottom: 10px; }
        #seeker { width: 100%; accent-color: var(--primary); margin: 15px 0; }

        /* Setup / Activation */
        #setup { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; text-align: center; }
        #activatePlayer { position: fixed; inset: 0; background: rgba(99, 102, 241, 0.9); z-index: 2000; display: none; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>

    <div id="setup">
        <div style="width: 300px;">
            <h2 style="color:var(--primary)">MASTER SYNC</h2>
            <input type="text" id="pass" placeholder="Room Token">
            <button style="width:100%; background:var(--primary); padding:15px; margin-bottom:10px; border:none;" onclick="init('player')">SET AS PLAYER</button>
            <button style="width:100%; background:transparent; padding:15px; border:1px solid #333;" onclick="init('remote')">SET AS REMOTE</button>
        </div>
    </div>

    <div id="activatePlayer" onclick="unlockPlayer()">
        <h1>TAP TO ACTIVATE PLAYER</h1>
    </div>

    <div id="playerStage">
        <div id="vContainer">
            <video id="mainVid" playsinline webkit-playsinline crossorigin="anonymous"></video>
        </div>
    </div>

    <div id="remoteStage">
        <div class="panel">
            <input type="text" id="url" placeholder="Video Link (Direct MP4/WebM)">
            <button style="width:100%; background:var(--primary); border:none;" onclick="send('URL', document.getElementById('url').value)">PUSH TO SCREEN</button>
        </div>

        <input type="range" id="seeker" value="0" min="0" max="100" step="0.1">

        <div class="panel">
            <div class="grid-4">
                <button onclick="send('PLAY')">PLAY/PAUSE</button>
                <button onclick="send('MUTE')">MUTE/UNMUTE</button>
                <button onclick="send('SEEK', -15)">-15s</button>
                <button onclick="send('SEEK', 15)">+15s</button>
            </div>
        </div>

        <div class="panel">
            <div class="grid-4">
                <button onclick="send('ZOOM', 1)">1x</button>
                <button onclick="send('ZOOM', 2)">2x</button>
                <button onclick="send('ZOOM', 4)">4x</button>
                <button onclick="send('ROTATE', 90)">ROT 90</button>
            </div>
        </div>

        <div class="panel">
            <div class="grid-4">
                <button onclick="send('PAN', 'up')">UP</button>
                <button onclick="send('PAN', 'down')">DOWN</button>
                <button onclick="send('PAN', 'left')">LEFT</button>
                <button onclick="send('PAN', 'right')">RIGHT</button>
            </div>
        </div>
        <button style="width:100%;" onclick="send('PAN', 'reset')">RESET VIEWPORT</button>
    </div>

    <script>
        let peer, conn, role;
        const v = document.getElementById('mainVid');
        const vc = document.getElementById('vContainer');
        const st = { z: 1, r: 0, x: 0, y: 0 };

        function init(r) {
            role = r;
            const code = document.getElementById('pass').value.trim();
            if(!code) return alert("Enter Token");
            
            peer = new Peer(role === 'player' ? code + "-p" : code + "-r");
            
            peer.on('open', () => {
                document.getElementById('setup').style.display = 'none';
                if(role === 'player') {
                    document.getElementById('activatePlayer').style.display = 'flex';
                } else {
                    document.getElementById('remoteStage').style.display = 'flex';
                    connectToPlayer(code + "-p");
                }
            });

            peer.on('connection', c => { conn = c; setupConnection(); });
        }

        function unlockPlayer() {
            document.getElementById('activatePlayer').style.display = 'none';
            document.getElementById('playerStage').style.display = 'block';
            v.play().catch(() => { console.log("Waiting for video push..."); });
            if(document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        }

        function connectToPlayer(id) {
            conn = peer.connect(id, { reliable: true });
            setupConnection();
        }

        function setupConnection() {
            conn.on('open', () => { console.log("Connected"); });
            conn.on('data', data => {
                if(role === 'player') execute(data);
                if(role === 'remote' && data.type === 'TIME') document.getElementById('seeker').value = data.val;
            });
        }

        function send(type, val) {
            if(conn && conn.open) conn.send({type, val});
        }

        function execute(c) {
            if(c.type === 'URL') { v.src = c.val; v.load(); v.play(); }
            if(c.type === 'PLAY') v.paused ? v.play() : v.pause();
            if(c.type === 'MUTE') v.muted = !v.muted;
            if(c.type === 'SEEK') v.currentTime += c.val;
            if(c.type === 'SEEK_ABS') v.currentTime = (c.val / 100) * v.duration;
            if(c.type === 'ZOOM') st.z = c.val;
            if(c.type === 'ROTATE') st.r = (st.r + c.val) % 360;
            if(c.type === 'PAN') {
                if(c.val === 'up') st.y -= 40;
                if(c.val === 'down') st.y += 40;
                if(c.val === 'left') st.x -= 40;
                if(c.val === 'right') st.x += 40;
                if(c.val === 'reset') { st.x=0; st.y=0; st.z=1; st.r=0; }
            }
            vc.style.transform = `scale(${st.z}) rotate(${st.r}deg) translate(${st.x}px, ${st.y}px)`;
        }

        document.getElementById('seeker').oninput = (e) => {
            if(role === 'remote') send('SEEK_ABS', e.target.value);
        };

        v.ontimeupdate = () => {
            if(role === 'player' && v.duration && conn) {
                conn.send({ type: 'TIME', val: (v.currentTime / v.duration) * 100 });
            }
        };
    </script>
</body>
</html>
