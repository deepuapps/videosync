<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Sync - Cinema Command</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --primary: #6366f1; --accent: #fbbf24; --bg: #000; --panel: rgba(20, 20, 25, 0.95); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }

        /* Player - True Fullscreen */
        #playerStage { position: absolute; inset: 0; display: none; z-index: 1; background: #000; }
        #vContainer { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; transition: transform 0.2s ease-out; }
        video { width: 100%; height: 100%; object-fit: contain; }

        /* Remote - Control Center */
        #remoteStage { position: absolute; inset: 0; display: none; z-index: 10; background: #05070a; padding: 15px; flex-direction: column; }
        
        /* Compact UI Panels */
        .panel { background: var(--panel); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 12px; margin-bottom: 10px; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        
        button { 
            padding: 12px 5px; border-radius: 8px; border: 1px solid #333; 
            background: #1a1a20; color: #fff; font-size: 10px; font-weight: bold; cursor: pointer;
        }
        button:active { background: var(--primary); border-color: var(--primary); }
        .btn-gold { color: var(--accent); border-color: var(--accent); }

        input[type="text"] { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; }
        #seeker { width: 100%; accent-color: var(--primary); margin: 15px 0; }

        /* Setup */
        #setup { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .card { width: 300px; text-align: center; }

        /* Ghost UI for Player */
        #playerUI { position: fixed; bottom: 10px; width: 100%; opacity: 0.1; transition: opacity 0.3s; z-index: 100; }
        #playerUI:hover { opacity: 1; }
    </style>
</head>
<body>

    <div id="setup">
        <div class="card">
            <h2 style="color:var(--primary)">CINEMA SYNC</h2>
            <input type="text" id="pass" placeholder="Enter Token" style="margin-bottom:10px;">
            <button style="width:100%; background:var(--primary); padding:15px; margin-bottom:10px;" onclick="init('player')">BE PLAYER (SCREEN)</button>
            <button style="width:100%; background:transparent; padding:15px;" onclick="init('remote')">BE REMOTE (CONTROLLER)</button>
        </div>
    </div>

    <div id="playerStage">
        <div id="vContainer">
            <video id="mainVid" playsinline></video>
        </div>
        <div id="playerUI">
            <button onclick="toggleFS()">FULLSCREEN</button>
            <button onclick="doCmd({type:'PAN', val:'reset'})">RESET VIEW</button>
        </div>
    </div>

    <div id="remoteStage">
        <div class="panel">
            <input type="text" id="url" placeholder="Paste Video URL...">
            <button style="width:100%; margin-top:10px; background:var(--primary)" onclick="send('URL', document.getElementById('url').value)">PUSH TO SCREEN</button>
        </div>

        <input type="range" id="seeker" value="0" step="0.1">

        <div class="panel">
            <div class="grid-4">
                <button onclick="send('PLAY')">PLAY/PAUSE</button>
                <button onclick="send('SEEK', -15)">-15s</button>
                <button onclick="send('SEEK', 15)">+15s</button>
                <button class="btn-gold" onclick="send('PAN', 'reset')">RESET</button>
            </div>
        </div>

        <div class="panel">
            <div style="font-size:10px; margin-bottom:8px; color:#666;">ZOOM & ROTATE</div>
            <div class="grid-4">
                <button onclick="send('ZOOM', 1.5)">1.5x</button>
                <button onclick="send('ZOOM', 2.5)">2.5x</button>
                <button onclick="send('ZOOM', 4)">4.0x</button>
                <button onclick="send('ROTATE', 90)">ROT 90</button>
            </div>
        </div>

        <div class="panel">
            <div style="font-size:10px; margin-bottom:8px; color:#666;">PRECISION PAN</div>
            <div class="grid-4">
                <button onclick="send('PAN', 'up')">UP</button>
                <button onclick="send('PAN', 'down')">DOWN</button>
                <button onclick="send('PAN', 'left')">LEFT</button>
                <button onclick="send('PAN', 'right')">RIGHT</button>
            </div>
        </div>
        
        <div class="panel" style="flex:1; display:flex; align-items:center; justify-content:center;">
            <div style="text-align:center; opacity:0.3; font-size:11px;">
                CONNECTED TO PLAYER<br>
                <span id="stat">WAITING...</span>
            </div>
        </div>
    </div>

    <script>
        let peer, conn, role;
        const v = document.getElementById('mainVid');
        const vc = document.getElementById('vContainer');
        const st = { z: 1, r: 0, x: 0, y: 0 };

        function init(r) {
            role = r;
            const code = document.getElementById('pass').value;
            if(!code) return alert("Token Required");
            
            peer = new Peer(role === 'player' ? code + "-p" : code + "-r");
            
            peer.on('open', () => {
                document.getElementById('setup').style.display = 'none';
                if(role === 'player') {
                    document.getElementById('playerStage').style.display = 'block';
                } else {
                    document.getElementById('remoteStage').style.display = 'flex';
                    connect(code + "-p");
                }
            });

            peer.on('connection', c => { conn = c; setupConn(); });
        }

        function connect(id) { conn = peer.connect(id); setupConn(); }
        
        function setupConn() {
            conn.on('open', () => { if(role === 'remote') document.getElementById('stat').innerText = "LINKED"; });
            conn.on('data', d => { if(role === 'player') doCmd(d); });
        }

        function send(type, val) {
            if(conn && conn.open) conn.send({type, val});
        }

        function doCmd(c) {
            if(c.type === 'URL') { v.src = c.val; v.play(); }
            if(c.type === 'PLAY') v.paused ? v.play() : v.pause();
            if(c.type === 'SEEK') v.currentTime += c.val;
            if(c.type === 'SEEK_ABS') v.currentTime = c.val;
            if(c.type === 'ZOOM') st.z = c.val;
            if(c.type === 'ROTATE') st.r = (st.r + c.val) % 360;
            if(c.type === 'PAN') {
                const step = 40;
                if(c.val === 'up') st.y -= step;
                if(c.val === 'down') st.y += step;
                if(c.val === 'left') st.x -= step;
                if(c.val === 'right') st.x += step;
                if(c.val === 'reset') { st.x=0; st.y=0; st.z=1; st.r=0; }
            }
            vc.style.transform = `scale(${st.z}) rotate(${st.r}deg) translate(${st.x}px, ${st.y}px)`;
        }

        function toggleFS() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        }

        // Seeker Sync
        if(role === 'player') {
            v.ontimeupdate = () => {
                if(v.duration && conn) conn.send({type: 'SYNC_TIME', time: (v.currentTime / v.duration) * 100});
            };
        } else {
            // Remote receives time sync from player
            peer.on('connection', c => {
                c.on('data', d => {
                    if(d.type === 'SYNC_TIME') document.getElementById('seeker').value = d.time;
                });
            });
        }

        document.getElementById('seeker').oninput = (e) => {
            if(role === 'remote') send('SEEK_ABS', (e.target.value / 100) * v.duration);
        };
    </script>
</body>
</html>
